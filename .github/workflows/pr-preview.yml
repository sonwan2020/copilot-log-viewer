# Deploy PR preview to GitHub Pages and post a comment with the preview URL
name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: pr-previews/pr-${{ github.event.number }}
          keep_files: true
          exclude_assets: '.github,.git,.gitignore,.gitattributes,.squad,.copilot,package.json,prompt.txt,CLAUDE.md'

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const url = `https://${owner}.github.io/${repoName}/pr-previews/pr-${prNumber}/`;

            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n## 🚀 PR Preview\n\nYour preview is ready: **[${url}](${url})**\n\n> _This preview will be automatically removed when the PR is closed._`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo: repoName,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo: repoName,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="pr-previews/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove PR preview for #${{ github.event.number }}"
            git push
          else
            echo "Preview directory not found, skipping cleanup."
          fi
