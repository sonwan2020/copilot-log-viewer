<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'none'; connect-src 'none';">
  <title>Copilot Adapter Logs Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/vendor/hljs-github.min.css" id="hljs-theme-light">
  <link rel="stylesheet" href="css/vendor/hljs-github-dark.min.css" id="hljs-theme-dark" disabled>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>
        <span>&#128209;</span> Copilot Adapter Logs Viewer
      </h1>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#9790;</button>
      </div>
    </header>

    <!-- Drop Zone -->
    <div class="drop-zone-container" id="dropZoneContainer">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">&#128230;</div>
        <div class="drop-zone-text">Drag &amp; drop <code>.jsonl</code> log files here</div>
        <div class="drop-zone-hint">or click to browse files</div>
        <input type="file" id="fileInput" accept=".jsonl,.json" multiple hidden>
      </div>
    </div>

    <!-- File Info Bar (shown after loading) -->
    <div class="file-info hidden" id="fileInfo">
      <span class="file-info-item" id="fileName"></span>
      <span class="file-info-item" id="fileSize"></span>
      <span class="file-info-item" id="entryCount"></span>
      <span id="truncatedBadge" class="hidden"><span class="badge badge-warning">Truncated</span></span>
      <button class="close-btn" id="closeFile" title="Close file">&times;</button>
    </div>

    <!-- Main Content -->
    <div class="main-content hidden" id="mainContent">
      <!-- Sidebar: Entry List -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span>Entries</span>
          <span id="filteredCount"></span>
        </div>
        <div class="sidebar-filter">
          <select id="modelFilter">
            <option value="">All models</option>
          </select>
          <input type="text" id="searchInput" placeholder="Search messages...">
        </div>
        <div class="entry-list" id="entryList"></div>
      </aside>

      <!-- Detail Panel -->
      <main class="detail-panel">
        <div class="detail-empty" id="detailEmpty">
          <span>Select an entry from the list to view details</span>
        </div>
        <div class="hidden" id="detailView">
          <!-- Detail Header -->
          <div class="detail-header" id="detailHeader"></div>

          <!-- Search Navigation -->
          <div class="search-nav hidden" id="searchNav">
            <button class="search-nav-btn" id="searchPrev" title="Previous match" disabled>&#9650;</button>
            <span class="search-nav-count" id="searchMatchCount"></span>
            <button class="search-nav-btn" id="searchNext" title="Next match" disabled>&#9660;</button>
          </div>

          <!-- Tabs -->
          <div class="tabs" id="tabs">
            <button class="tab active" data-tab="messages">Messages</button>
            <button class="tab" data-tab="system">System <span class="tab-count" id="systemCount"></span></button>
            <button class="tab" data-tab="tools">Tools <span class="tab-count" id="toolsCount"></span></button>
            <button class="tab" data-tab="request">Request</button>
            <button class="tab" data-tab="response">Response</button>
            <button class="tab" data-tab="raw">Raw</button>
          </div>

          <!-- Tab Content -->
          <div class="tab-content" id="tabContent"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/vendor/highlight.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
